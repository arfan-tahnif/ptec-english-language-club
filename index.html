  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["'Playfair Display'", 'Georgia', 'serif'],
            sans: ["'Inter'", 'system-ui', 'sans-serif'],
          },
          colors: {
            background: 'hsl(40,30%,97%)',
            foreground: 'hsl(220,30%,15%)',
            card: 'hsl(0,0%,100%)',
            'card-foreground': 'hsl(220,30%,15%)',
            primary: { DEFAULT: 'hsl(230,100%,25%)', foreground: 'hsl(45,100%,95%)' },
            secondary: { DEFAULT: 'hsl(45,90%,55%)', foreground: 'hsl(230,100%,15%)' },
            muted: { DEFAULT: 'hsl(40,20%,93%)', foreground: 'hsl(220,15%,50%)' },
            accent: { DEFAULT: 'hsl(45,90%,55%)', foreground: 'hsl(230,100%,15%)' },
            destructive: { DEFAULT: 'hsl(0,84%,60%)', foreground: 'hsl(210,40%,98%)' },
            border: 'hsl(40,20%,90%)',
            input: 'hsl(40,20%,90%)',
            ring: 'hsl(230,100%,25%)',
          },
          borderRadius: { '2xl': '1rem', '3xl': '1.5rem' },
          boxShadow: {
            card: '0 4px 24px -4px hsl(230 30% 20% / 0.08)',
            'card-hover': '0 8px 32px -4px hsl(230 30% 20% / 0.12)',
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: hsl(40,30%,97%); color: hsl(220,30%,15%); }
    h1,h2,h3 { font-family: 'Playfair Display', Georgia, serif; }

    .word-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 24px -4px hsl(230 30% 20% / 0.08);
      transition: box-shadow 0.3s;
    }
    .word-card:hover { box-shadow: 0 8px 32px -4px hsl(230 30% 20% / 0.12); }

    .category-chip {
      background: hsl(40,20%,93%);
      color: hsl(220,30%,15%);
      border-radius: 0.75rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .category-chip:hover { border-color: hsl(45,90%,55%); background: hsl(45,90%,55%,0.1); }
    .category-chip.active { background: hsl(230,100%,25%); color: hsl(45,100%,95%); border-color: hsl(230,100%,25%); }

    .icon-btn {
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: hsl(40,20%,93%);
      color: hsl(220,15%,50%);
      border: none; cursor: pointer;
      transition: all 0.2s;
    }
    .icon-btn:hover { background: hsl(45,90%,55%); color: hsl(230,100%,15%); }
    .icon-btn.saved { color: hsl(0,84%,60%); }
    .icon-btn.saved svg { fill: hsl(0,84%,60%); }

    .gold-gradient { background: linear-gradient(135deg, hsl(45,90%,55%), hsl(45,100%,65%)); }

    /* Slide animation */
    @keyframes slideInRight { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInLeft  { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeInUp     { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes scaleIn      { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .animate-slide-right { animation: slideInRight 0.3s ease both; }
    .animate-slide-left  { animation: slideInLeft 0.3s ease both; }
    .animate-fade-up     { animation: fadeInUp 0.3s ease both; }
    .animate-scale-in    { animation: scaleIn 0.3s ease both; }

    /* Staggered word list animations */
    .word-list-item { animation: fadeInUp 0.3s ease both; }

    /* Quiz option buttons */
    .quiz-option {
      width: 100%; text-align: left; padding: 1rem;
      border-radius: 0.75rem; border: 2px solid hsl(40,20%,90%);
      background: white; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .quiz-option:hover:not(:disabled) { border-color: hsl(230,100%,25%,0.4); }
    .quiz-option:disabled { cursor: default; }
    .quiz-option.correct { border-color: #22c55e; background: #f0fdf4; }
    .quiz-option.wrong   { border-color: hsl(0,84%,60%); background: #fff1f2; }

    .mode-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.625rem 1.25rem; border-radius: 9999px;
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s; border: none;
      background: hsl(40,20%,93%); color: hsl(220,15%,50%);
    }
    .mode-btn:hover { color: hsl(220,30%,15%); }
    .mode-btn.active { background: hsl(230,100%,25%); color: hsl(45,100%,95%); }

    .progress-bar { height: 0.625rem; border-radius: 9999px; background: hsl(40,20%,93%); overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 9999px; background: linear-gradient(135deg, hsl(45,90%,55%), hsl(45,100%,65%)); transition: width 0.7s ease; }
    .progress-fill-primary { height: 100%; border-radius: 9999px; background: hsl(230,100%,25%); transition: width 0.3s ease; }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    @media (min-width: 768px) { .container { padding: 0 2rem; } }

    /* Nav dots */
    .nav-dot { height: 0.375rem; border-radius: 9999px; background: hsl(40,20%,90%); transition: all 0.3s; flex-shrink: 0; }
    .nav-dot.active { width: 1.5rem !important; background: hsl(230,100%,25%); }
    .nav-dot.inactive { width: 0.375rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(40,20%,85%); border-radius: 99px; }

    /* Backdrop blur for header */
    .sticky-header { position: sticky; top: 0; z-index: 50; border-bottom: 1px solid hsl(40,20%,90%); background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); }
  </style>
</head>
