  { id: 66, word: "Conventional", phonetic: "/kənˈven.ʃən.əl/", partOfSpeech: "adjective", definition: "Based on what is generally done or believed.", example: "She rejected conventional methods in favor of innovation.", category: "IELTS Essentials" },
  { id: 67, word: "Converge", phonetic: "/kənˈvɜːdʒ/", partOfSpeech: "verb", definition: "To come together from different directions.", example: "Several factors converged to cause the crisis.", category: "IELTS Essentials" },
  { id: 68, word: "Convert", phonetic: "/kənˈvɜːrt/", partOfSpeech: "verb", definition: "To change the form or function of something.", example: "They converted the warehouse into luxury apartments.", category: "IELTS Essentials" },
  { id: 69, word: "Convey", phonetic: "/kənˈveɪ/", partOfSpeech: "verb", definition: "To transport or communicate a message.", example: "The poem conveys a sense of longing and nostalgia.", category: "IELTS Essentials" },
  { id: 70, word: "Cooperate", phonetic: "/kəʊˈɒp.ər.eɪt/", partOfSpeech: "verb", definition: "To act jointly with others for mutual benefit.", example: "The two nations agreed to cooperate on climate research.", category: "IELTS Essentials" },
  { id: 71, word: "Coordinate", phonetic: "/kəʊˈɔː.dɪ.neɪt/", partOfSpeech: "verb", definition: "To bring elements into a proper relationship.", example: "She coordinated the relief efforts after the earthquake.", category: "IELTS Essentials" },
  { id: 72, word: "Core", phonetic: "/kɔːr/", partOfSpeech: "noun", definition: "The central or most important part.", example: "Innovation is at the core of our strategy.", category: "IELTS Essentials" },
  { id: 73, word: "Correlate", phonetic: "/ˈkɒr.ə.leɪt/", partOfSpeech: "verb", definition: "To have a mutual relationship or connection.", example: "Income levels correlate with educational attainment.", category: "IELTS Essentials" },
  { id: 74, word: "Correspond", phonetic: "/ˌkɒr.ɪˈspɒnd/", partOfSpeech: "verb", definition: "To have a close similarity or match.", example: "The results correspond with our initial predictions.", category: "IELTS Essentials" },
  { id: 75, word: "Credible", phonetic: "/ˈkred.ɪ.bəl/", partOfSpeech: "adjective", definition: "Able to be believed; convincing.", example: "She is a credible witness in the trial.", category: "IELTS Essentials" },
  { id: 76, word: "Criteria", phonetic: "/kraɪˈtɪə.ri.ə/", partOfSpeech: "noun", definition: "Standards by which something is judged.", example: "Applicants must meet strict criteria for admission.", category: "IELTS Essentials" },
  { id: 77, word: "Crucial", phonetic: "/ˈkruː.ʃəl/", partOfSpeech: "adjective", definition: "Of great importance; critical.", example: "Timing is crucial in emergency medical care.", category: "IELTS Essentials" },
  { id: 78, word: "Cumulative", phonetic: "/ˈkjuː.mjə.lə.tɪv/", partOfSpeech: "adjective", definition: "Increasing by accumulation or successive additions.", example: "The cumulative effect of pollution is devastating.", category: "IELTS Essentials" },
  { id: 79, word: "Currency", phonetic: "/ˈkʌr.ən.si/", partOfSpeech: "noun", definition: "A system of money in general use.", example: "The local currency lost value against the dollar.", category: "IELTS Essentials" },
  { id: 80, word: "Curtail", phonetic: "/kɜːˈteɪl/", partOfSpeech: "verb", definition: "To reduce in extent or quantity.", example: "The government curtailed spending on public services.", category: "IELTS Essentials" },
  { id: 81, word: "Decline", phonetic: "/dɪˈklaɪn/", partOfSpeech: "verb", definition: "To become smaller, fewer, or less; to decrease.", example: "The population has declined by 10% in a decade.", category: "IELTS Essentials" },
  { id: 82, word: "Deduce", phonetic: "/dɪˈdjuːs/", partOfSpeech: "verb", definition: "To arrive at a fact by reasoning.", example: "From the evidence, we can deduce the cause of failure.", category: "IELTS Essentials" },
  { id: 83, word: "Deficiency", phonetic: "/dɪˈfɪʃ.ən.si/", partOfSpeech: "noun", definition: "A lack or shortage of something.", example: "Vitamin D deficiency is common in northern climates.", category: "IELTS Essentials" },
  { id: 84, word: "Deficit", phonetic: "/ˈdef.ɪ.sɪt/", partOfSpeech: "noun", definition: "The amount by which something falls short.", example: "The country faces a growing trade deficit.", category: "IELTS Essentials" },
  { id: 85, word: "Deliberate", phonetic: "/dɪˈlɪb.ər.ət/", partOfSpeech: "adjective", definition: "Done consciously and intentionally.", example: "It was a deliberate attempt to mislead the public.", category: "IELTS Essentials" },
  { id: 86, word: "Demonstrate", phonetic: "/ˈdem.ən.streɪt/", partOfSpeech: "verb", definition: "To clearly show the existence or truth of.", example: "The experiment demonstrated the theory's validity.", category: "IELTS Essentials" },
  { id: 87, word: "Denote", phonetic: "/dɪˈnəʊt/", partOfSpeech: "verb", definition: "To be a sign of; to indicate.", example: "A red flag denotes danger in many cultures.", category: "IELTS Essentials" },
  { id: 88, word: "Deplete", phonetic: "/dɪˈpliːt/", partOfSpeech: "verb", definition: "To use up the supply or resources of.", example: "Overfishing has depleted stocks in the ocean.", category: "IELTS Essentials" },
  { id: 89, word: "Depict", phonetic: "/dɪˈpɪkt/", partOfSpeech: "verb", definition: "To represent by a drawing or painting.", example: "The mural depicts scenes from local history.", category: "IELTS Essentials" },
  { id: 90, word: "Derive", phonetic: "/dɪˈraɪv/", partOfSpeech: "verb", definition: "To obtain something from a specified source.", example: "Many English words derive from Latin or Greek.", category: "IELTS Essentials" },
  { id: 91, word: "Deteriorate", phonetic: "/dɪˈtɪə.ri.ə.reɪt/", partOfSpeech: "verb", definition: "To become progressively worse.", example: "Air quality continued to deteriorate throughout the summer.", category: "IELTS Essentials" },
  { id: 92, word: "Deviate", phonetic: "/ˈdiː.vi.eɪt/", partOfSpeech: "verb", definition: "To depart from an established course.", example: "The pilot deviated from the planned flight path.", category: "IELTS Essentials" },
  { id: 93, word: "Devise", phonetic: "/dɪˈvaɪz/", partOfSpeech: "verb", definition: "To plan or invent by careful thought.", example: "Engineers devised a new filtration system.", category: "IELTS Essentials" },
  { id: 94, word: "Devote", phonetic: "/dɪˈvəʊt/", partOfSpeech: "verb", definition: "To give time or resources to a purpose.", example: "She devoted her life to helping underprivileged children.", category: "IELTS Essentials" },
  { id: 95, word: "Differentiate", phonetic: "/ˌdɪf.əˈren.ʃi.eɪt/", partOfSpeech: "verb", definition: "To recognize or identify as different.", example: "It is important to differentiate between fact and opinion.", category: "IELTS Essentials" },
  { id: 96, word: "Diffuse", phonetic: "/dɪˈfjuːz/", partOfSpeech: "verb", definition: "To spread over a wide area.", example: "The scent of flowers diffused through the garden.", category: "IELTS Essentials" },
  { id: 97, word: "Dilemma", phonetic: "/dɪˈlem.ə/", partOfSpeech: "noun", definition: "A situation requiring a difficult choice.", example: "She faced the dilemma of choosing career over family.", category: "IELTS Essentials" },
  { id: 98, word: "Diminish", phonetic: "/dɪˈmɪn.ɪʃ/", partOfSpeech: "verb", definition: "To make or become less.", example: "Nothing could diminish her enthusiasm for the project.", category: "IELTS Essentials" },
  { id: 99, word: "Displace", phonetic: "/dɪsˈpleɪs/", partOfSpeech: "verb", definition: "To move something from its proper place.", example: "Thousands of people were displaced by the flooding.", category: "IELTS Essentials" },
  { id: 100, word: "Dispose", phonetic: "/dɪˈspəʊz/", partOfSpeech: "verb", definition: "To get rid of or deal with.", example: "Please dispose of waste in the designated bins.", category: "IELTS Essentials" },
  { id: 101, word: "Distinct", phonetic: "/dɪˈstɪŋkt/", partOfSpeech: "adjective", definition: "Recognizably different or separate.", example: "There are three distinct stages in the process.", category: "IELTS Essentials" },
  { id: 102, word: "Distort", phonetic: "/dɪˈstɔːrt/", partOfSpeech: "verb", definition: "To pull or twist out of shape; misrepresent.", example: "The media distorted the politician's words.", category: "IELTS Essentials" },
  { id: 103, word: "Diverse", phonetic: "/daɪˈvɜːrs/", partOfSpeech: "adjective", definition: "Showing a great deal of variety.", example: "London is one of the most diverse cities in the world.", category: "IELTS Essentials" },
  { id: 104, word: "Domain", phonetic: "/dəˈmeɪn/", partOfSpeech: "noun", definition: "An area of territory or field of activity.", example: "Artificial intelligence is a rapidly growing domain.", category: "IELTS Essentials" },
  { id: 105, word: "Domestic", phonetic: "/dəˈmes.tɪk/", partOfSpeech: "adjective", definition: "Relating to the running of a home or country.", example: "Domestic tourism has increased since the pandemic.", category: "IELTS Essentials" },
  { id: 106, word: "Dominant", phonetic: "/ˈdɒm.ɪ.nənt/", partOfSpeech: "adjective", definition: "Most important, powerful, or influential.", example: "English is the dominant language in international business.", category: "IELTS Essentials" },
  { id: 107, word: "Draft", phonetic: "/drɑːft/", partOfSpeech: "noun", definition: "A preliminary version of a piece of writing.", example: "She submitted the first draft of her thesis.", category: "IELTS Essentials" },
  { id: 108, word: "Duration", phonetic: "/djʊˈreɪ.ʃən/", partOfSpeech: "noun", definition: "The time during which something continues.", example: "The duration of the course is twelve weeks.", category: "IELTS Essentials" },
  { id: 109, word: "Dynamic", phonetic: "/daɪˈnæm.ɪk/", partOfSpeech: "adjective", definition: "Characterized by constant change or activity.", example: "The city has a dynamic and growing economy.", category: "IELTS Essentials" },
  { id: 110, word: "Elaborate", phonetic: "/ɪˈlæb.ər.ət/", partOfSpeech: "adjective", definition: "Involving many careful details or complex design.", example: "She wore an elaborate costume for the festival.", category: "IELTS Essentials" },
  { id: 111, word: "Eliminate", phonetic: "/ɪˈlɪm.ɪ.neɪt/", partOfSpeech: "verb", definition: "To completely remove or get rid of.", example: "The goal is to eliminate poverty worldwide.", category: "IELTS Essentials" },
  { id: 112, word: "Eloquent", phonetic: "/ˈel.ə.kwənt/", partOfSpeech: "adjective", definition: "Fluent or persuasive in speaking or writing.", example: "Her eloquent speech moved the entire audience to tears.", category: "IELTS Essentials" },
  { id: 113, word: "Emerge", phonetic: "/ɪˈmɜːdʒ/", partOfSpeech: "verb", definition: "To move out of or come into view.", example: "New evidence emerged during the investigation.", category: "IELTS Essentials" },
  { id: 114, word: "Empirical", phonetic: "/ɪmˈpɪr.ɪ.kəl/", partOfSpeech: "adjective", definition: "Based on observation or experience rather than theory.", example: "The study provides empirical evidence for the hypothesis.", category: "IELTS Essentials" },
  { id: 115, word: "Enable", phonetic: "/ɪˈneɪ.bəl/", partOfSpeech: "verb", definition: "To give someone the authority or means to do something.", example: "Technology enables people to work from anywhere.", category: "IELTS Essentials" },
  { id: 116, word: "Encounter", phonetic: "/ɪnˈkaʊn.tər/", partOfSpeech: "verb", definition: "To unexpectedly experience or be faced with.", example: "Travelers may encounter delays due to construction.", category: "IELTS Essentials" },
  { id: 117, word: "Enormous", phonetic: "/ɪˈnɔː.məs/", partOfSpeech: "adjective", definition: "Very large in size, quantity, or extent.", example: "The project required an enormous amount of funding.", category: "IELTS Essentials" },
  { id: 118, word: "Ensure", phonetic: "/ɪnˈʃʊər/", partOfSpeech: "verb", definition: "To make certain that something will occur.", example: "Please ensure all doors are locked before leaving.", category: "IELTS Essentials" },
  { id: 119, word: "Entity", phonetic: "/ˈen.tɪ.ti/", partOfSpeech: "noun", definition: "A thing with distinct and independent existence.", example: "Each company operates as a separate legal entity.", category: "IELTS Essentials" },
  { id: 120, word: "Erode", phonetic: "/ɪˈrəʊd/", partOfSpeech: "verb", definition: "To gradually destroy or be gradually destroyed.", example: "Wind and rain eroded the limestone cliffs over centuries.", category: "IELTS Essentials" },
  { id: 121, word: "Establish", phonetic: "/ɪˈstæb.lɪʃ/", partOfSpeech: "verb", definition: "To set up on a firm or permanent basis.", example: "The university was established in 1850.", category: "IELTS Essentials" },
  { id: 122, word: "Estimate", phonetic: "/ˈes.tɪ.meɪt/", partOfSpeech: "verb", definition: "To roughly calculate or judge the value of.", example: "Experts estimate the cost at over ten million dollars.", category: "IELTS Essentials" },
  { id: 123, word: "Evaluate", phonetic: "/ɪˈvæl.ju.eɪt/", partOfSpeech: "verb", definition: "To form an idea of the value or quality of.", example: "Teachers evaluate students using various methods.", category: "IELTS Essentials" },
  { id: 124, word: "Evident", phonetic: "/ˈev.ɪ.dənt/", partOfSpeech: "adjective", definition: "Plain or obvious; clearly seen or understood.", example: "It was evident that she had prepared thoroughly.", category: "IELTS Essentials" },
  { id: 125, word: "Evolve", phonetic: "/ɪˈvɒlv/", partOfSpeech: "verb", definition: "To develop gradually over time.", example: "The company's strategy evolved over the past decade.", category: "IELTS Essentials" },
  { id: 126, word: "Exceed", phonetic: "/ɪkˈsiːd/", partOfSpeech: "verb", definition: "To be greater than or go beyond.", example: "Sales exceeded expectations by 20%.", category: "IELTS Essentials" },
  { id: 127, word: "Exclude", phonetic: "/ɪkˈskluːd/", partOfSpeech: "verb", definition: "To deny access to or prevent from participating.", example: "The report excludes data from rural areas.", category: "IELTS Essentials" },
  { id: 128, word: "Exhibit", phonetic: "/ɪɡˈzɪb.ɪt/", partOfSpeech: "verb", definition: "To publicly display or to show a quality.", example: "The patient exhibits symptoms of fatigue.", category: "IELTS Essentials" },
  { id: 129, word: "Expand", phonetic: "/ɪkˈspænd/", partOfSpeech: "verb", definition: "To become or make larger or more extensive.", example: "The company plans to expand into Asian markets.", category: "IELTS Essentials" },
  { id: 130, word: "Explicit", phonetic: "/ɪkˈsplɪs.ɪt/", partOfSpeech: "adjective", definition: "Stated clearly and in detail.", example: "The instructions were explicit and easy to follow.", category: "IELTS Essentials" },
  { id: 131, word: "Exploit", phonetic: "/ɪkˈsplɔɪt/", partOfSpeech: "verb", definition: "To make full use of a resource or to use unfairly.", example: "Companies exploit cheap labor in developing countries.", category: "IELTS Essentials" },
  { id: 132, word: "Facilitate", phonetic: "/fəˈsɪl.ɪ.teɪt/", partOfSpeech: "verb", definition: "To make an action or process easier.", example: "The new software facilitates remote collaboration.", category: "IELTS Essentials" },
  { id: 133, word: "Fluctuate", phonetic: "/ˈflʌk.tʃu.eɪt/", partOfSpeech: "verb", definition: "To rise and fall irregularly in number or amount.", example: "Oil prices fluctuate according to global demand.", category: "IELTS Essentials" },
  { id: 134, word: "Formulate", phonetic: "/ˈfɔː.mjə.leɪt/", partOfSpeech: "verb", definition: "To create or devise methodically.", example: "Scientists formulated a new theory of evolution.", category: "IELTS Essentials" },
  { id: 135, word: "Fundamental", phonetic: "/ˌfʌn.dəˈmen.təl/", partOfSpeech: "adjective", definition: "Forming a necessary base or core; essential.", example: "Reading is a fundamental skill for academic success.", category: "IELTS Essentials" },
  { id: 136, word: "Generate", phonetic: "/ˈdʒen.ə.reɪt/", partOfSpeech: "verb", definition: "To cause something to arise or come about.", example: "The project generated significant public interest.", category: "IELTS Essentials" },
  { id: 137, word: "Hierarchy", phonetic: "/ˈhaɪə.rɑː.ki/", partOfSpeech: "noun", definition: "A system in which members are ranked by status.", example: "The corporate hierarchy determines decision-making power.", category: "IELTS Essentials" },
  { id: 138, word: "Hypothesis", phonetic: "/haɪˈpɒθ.ə.sɪs/", partOfSpeech: "noun", definition: "A proposed explanation for a phenomenon.", example: "The hypothesis was tested through extensive experimentation.", category: "IELTS Essentials" },
  { id: 139, word: "Identical", phonetic: "/aɪˈden.tɪ.kəl/", partOfSpeech: "adjective", definition: "Similar in every detail; exactly alike.", example: "The twins wore identical outfits to the party.", category: "IELTS Essentials" },
  { id: 140, word: "Ideology", phonetic: "/ˌaɪ.diˈɒl.ə.dʒi/", partOfSpeech: "noun", definition: "A system of ideas and ideals forming the basis of a theory.", example: "Political ideology shapes how people view the world.", category: "IELTS Essentials" },
  { id: 141, word: "Immense", phonetic: "/ɪˈmens/", partOfSpeech: "adjective", definition: "Extremely large or great.", example: "The immense scale of the project impressed investors.", category: "IELTS Essentials" },
  { id: 142, word: "Implement", phonetic: "/ˈɪm.plɪ.ment/", partOfSpeech: "verb", definition: "To put a decision or plan into effect.", example: "The school implemented a new anti-bullying policy.", category: "IELTS Essentials" },
  { id: 143, word: "Implicate", phonetic: "/ˈɪm.plɪ.keɪt/", partOfSpeech: "verb", definition: "To show someone to be involved in a crime.", example: "The documents implicate several senior officials.", category: "IELTS Essentials" },
  { id: 144, word: "Implicit", phonetic: "/ɪmˈplɪs.ɪt/", partOfSpeech: "adjective", definition: "Implied though not plainly expressed.", example: "There was an implicit understanding between them.", category: "IELTS Essentials" },
  { id: 145, word: "Impose", phonetic: "/ɪmˈpəʊz/", partOfSpeech: "verb", definition: "To force something unwelcome to be accepted.", example: "The government imposed new restrictions on travel.", category: "IELTS Essentials" },
  { id: 146, word: "Incentive", phonetic: "/ɪnˈsen.tɪv/", partOfSpeech: "noun", definition: "A thing that motivates or encourages action.", example: "Tax breaks serve as an incentive for small businesses.", category: "IELTS Essentials" },
  { id: 147, word: "Incidence", phonetic: "/ˈɪn.sɪ.dəns/", partOfSpeech: "noun", definition: "The occurrence or rate of something.", example: "The incidence of diabetes has risen sharply.", category: "IELTS Essentials" },
  { id: 148, word: "Inclination", phonetic: "/ˌɪn.klɪˈneɪ.ʃən/", partOfSpeech: "noun", definition: "A person's natural tendency to act in a particular way.", example: "She had an inclination toward artistic pursuits.", category: "IELTS Essentials" },
  { id: 149, word: "Incorporate", phonetic: "/ɪnˈkɔː.pər.eɪt/", partOfSpeech: "verb", definition: "To take in or include as part of a whole.", example: "The design incorporates elements of traditional architecture.", category: "IELTS Essentials" },
  { id: 150, word: "Indicate", phonetic: "/ˈɪn.dɪ.keɪt/", partOfSpeech: "verb", definition: "To point out or show.", example: "Studies indicate that exercise reduces stress.", category: "IELTS Essentials" },
  { id: 151, word: "Induce", phonetic: "/ɪnˈdjuːs/", partOfSpeech: "verb", definition: "To succeed in persuading or to bring about.", example: "Stress can induce a range of health problems.", category: "IELTS Essentials" },
  { id: 152, word: "Inevitable", phonetic: "/ɪnˈev.ɪ.tə.bəl/", partOfSpeech: "adjective", definition: "Certain to happen; unavoidable.", example: "Change is inevitable in a growing organization.", category: "IELTS Essentials" },
  { id: 153, word: "Infer", phonetic: "/ɪnˈfɜːr/", partOfSpeech: "verb", definition: "To deduce from evidence and reasoning.", example: "From the data, we can infer a positive trend.", category: "IELTS Essentials" },
  { id: 154, word: "Infrastructure", phonetic: "/ˈɪn.frə.strʌk.tʃər/", partOfSpeech: "noun", definition: "The basic physical structures needed for operation.", example: "The country needs to invest in its aging infrastructure.", category: "IELTS Essentials" },
  { id: 155, word: "Inherent", phonetic: "/ɪnˈher.ənt/", partOfSpeech: "adjective", definition: "Existing as a natural or permanent quality.", example: "There are inherent risks in any surgical procedure.", category: "IELTS Essentials" },
  { id: 156, word: "Inhibit", phonetic: "/ɪnˈhɪb.ɪt/", partOfSpeech: "verb", definition: "To hinder or restrain an action or process.", example: "Fear of failure can inhibit creativity.", category: "IELTS Essentials" },
  { id: 157, word: "Initiate", phonetic: "/ɪˈnɪʃ.i.eɪt/", partOfSpeech: "verb", definition: "To cause a process or action to begin.", example: "The company initiated a review of its policies.", category: "IELTS Essentials" },
  { id: 158, word: "Innovation", phonetic: "/ˌɪn.əˈveɪ.ʃən/", partOfSpeech: "noun", definition: "The introduction of something new.", example: "Innovation drives economic growth in modern societies.", category: "IELTS Essentials" },
  { id: 159, word: "Insight", phonetic: "/ˈɪn.saɪt/", partOfSpeech: "noun", definition: "An accurate and deep understanding.", example: "The book provides valuable insights into human behavior.", category: "IELTS Essentials" },
  { id: 160, word: "Inspect", phonetic: "/ɪnˈspekt/", partOfSpeech: "verb", definition: "To look at something closely and critically.", example: "Officials inspected the building for safety violations.", category: "IELTS Essentials" },
  { id: 161, word: "Integral", phonetic: "/ˈɪn.tɪ.ɡrəl/", partOfSpeech: "adjective", definition: "Necessary to make a whole complete; essential.", example: "Music is an integral part of their culture.", category: "IELTS Essentials" },
  { id: 162, word: "Integrate", phonetic: "/ˈɪn.tɪ.ɡreɪt/", partOfSpeech: "verb", definition: "To combine things so they work together.", example: "The school integrates technology into every subject.", category: "IELTS Essentials" },
  { id: 163, word: "Integrity", phonetic: "/ɪnˈteɡ.rɪ.ti/", partOfSpeech: "noun", definition: "The quality of being honest and having moral principles.", example: "She is known for her integrity and fairness.", category: "IELTS Essentials" },
  { id: 164, word: "Intense", phonetic: "/ɪnˈtens/", partOfSpeech: "adjective", definition: "Of extreme force, degree, or strength.", example: "The intense heat made it difficult to work outdoors.", category: "IELTS Essentials" },
  { id: 165, word: "Interpret", phonetic: "/ɪnˈtɜː.prɪt/", partOfSpeech: "verb", definition: "To explain the meaning of something.", example: "Experts interpret the data in different ways.", category: "IELTS Essentials" },
  { id: 166, word: "Intervene", phonetic: "/ˌɪn.təˈviːn/", partOfSpeech: "verb", definition: "To come between so as to prevent or alter.", example: "The teacher intervened to stop the argument.", category: "IELTS Essentials" },
  { id: 167, word: "Intrinsic", phonetic: "/ɪnˈtrɪn.zɪk/", partOfSpeech: "adjective", definition: "Belonging naturally; essential.", example: "Curiosity is an intrinsic part of human nature.", category: "IELTS Essentials" },
  { id: 168, word: "Invoke", phonetic: "/ɪnˈvəʊk/", partOfSpeech: "verb", definition: "To cite or appeal to as an authority.", example: "The lawyer invoked the right to free speech.", category: "IELTS Essentials" },
  { id: 169, word: "Isolate", phonetic: "/ˈaɪ.sə.leɪt/", partOfSpeech: "verb", definition: "To set apart from others.", example: "Scientists isolated the virus responsible for the outbreak.", category: "IELTS Essentials" },
  { id: 170, word: "Justify", phonetic: "/ˈdʒʌs.tɪ.faɪ/", partOfSpeech: "verb", definition: "To show or prove to be right or reasonable.", example: "How can you justify spending so much money?", category: "IELTS Essentials" },
  { id: 171, word: "Maintain", phonetic: "/meɪnˈteɪn/", partOfSpeech: "verb", definition: "To cause or enable to continue.", example: "It is important to maintain a healthy lifestyle.", category: "IELTS Essentials" },
  { id: 172, word: "Manipulate", phonetic: "/məˈnɪp.jə.leɪt/", partOfSpeech: "verb", definition: "To handle or control in a skillful manner.", example: "The data was manipulated to show favorable results.", category: "IELTS Essentials" },
  { id: 173, word: "Marginal", phonetic: "/ˈmɑː.dʒɪ.nəl/", partOfSpeech: "adjective", definition: "Of minor importance or limited extent.", example: "The improvement was marginal at best.", category: "IELTS Essentials" },
  { id: 174, word: "Mediate", phonetic: "/ˈmiː.di.eɪt/", partOfSpeech: "verb", definition: "To intervene between parties to produce agreement.", example: "A neutral party was brought in to mediate the dispute.", category: "IELTS Essentials" },
  { id: 175, word: "Migrate", phonetic: "/maɪˈɡreɪt/", partOfSpeech: "verb", definition: "To move from one region or country to another.", example: "Birds migrate south for the winter season.", category: "IELTS Essentials" },
  { id: 176, word: "Minimize", phonetic: "/ˈmɪn.ɪ.maɪz/", partOfSpeech: "verb", definition: "To reduce something to the smallest possible amount.", example: "We need to minimize the risk of contamination.", category: "IELTS Essentials" },
  { id: 177, word: "Modify", phonetic: "/ˈmɒd.ɪ.faɪ/", partOfSpeech: "verb", definition: "To make partial changes to something.", example: "The plan was modified to include community feedback.", category: "IELTS Essentials" },
  { id: 178, word: "Monitor", phonetic: "/ˈmɒn.ɪ.tər/", partOfSpeech: "verb", definition: "To observe and check progress over time.", example: "Doctors monitor patients closely after surgery.", category: "IELTS Essentials" },
  { id: 179, word: "Negate", phonetic: "/nɪˈɡeɪt/", partOfSpeech: "verb", definition: "To nullify or make ineffective.", example: "The new evidence negates the previous findings.", category: "IELTS Essentials" },
  { id: 180, word: "Negligible", phonetic: "/ˈneɡ.lɪ.dʒɪ.bəl/", partOfSpeech: "adjective", definition: "So small as to be meaningless; insignificant.", example: "The difference in results was negligible.", category: "IELTS Essentials" },
  { id: 181, word: "Notwithstanding", phonetic: "/ˌnɒt.wɪðˈstæn.dɪŋ/", partOfSpeech: "preposition", definition: "In spite of; despite.", example: "Notwithstanding the rain, the event was a success.", category: "IELTS Essentials" },
  { id: 182, word: "Nuance", phonetic: "/ˈnjuː.ɑːns/", partOfSpeech: "noun", definition: "A subtle difference in meaning or expression.", example: "The nuances of the poem are lost in translation.", category: "IELTS Essentials" },
  { id: 183, word: "Oblige", phonetic: "/əˈblaɪdʒ/", partOfSpeech: "verb", definition: "To make someone legally or morally bound.", example: "The law obliges employers to provide safe conditions.", category: "IELTS Essentials" },
  { id: 184, word: "Obtain", phonetic: "/əbˈteɪn/", partOfSpeech: "verb", definition: "To get or acquire something.", example: "She obtained a scholarship to study abroad.", category: "IELTS Essentials" },
  { id: 185, word: "Occur", phonetic: "/əˈkɜːr/", partOfSpeech: "verb", definition: "To happen or take place.", example: "Earthquakes occur frequently in this region.", category: "IELTS Essentials" },
  { id: 186, word: "Offset", phonetic: "/ˈɒf.set/", partOfSpeech: "verb", definition: "To counterbalance or compensate for.", example: "Gains in one area offset losses in another.", category: "IELTS Essentials" },
  { id: 187, word: "Ongoing", phonetic: "/ˈɒn.ɡəʊ.ɪŋ/", partOfSpeech: "adjective", definition: "Continuing; still in progress.", example: "There is ongoing research into the effects of climate change.", category: "IELTS Essentials" },
  { id: 188, word: "Orient", phonetic: "/ˈɔː.ri.ent/", partOfSpeech: "verb", definition: "To align or position relative to surroundings.", example: "The course is designed to orient new students.", category: "IELTS Essentials" },
  { id: 189, word: "Overlap", phonetic: "/ˌəʊ.vəˈlæp/", partOfSpeech: "verb", definition: "To extend over and cover a part of.", example: "The two courses overlap in their content.", category: "IELTS Essentials" },
  { id: 190, word: "Paradigm", phonetic: "/ˈpær.ə.daɪm/", partOfSpeech: "noun", definition: "A typical example or model of something.", example: "The discovery created a new paradigm in physics.", category: "IELTS Essentials" },
  { id: 191, word: "Paradox", phonetic: "/ˈpær.ə.dɒks/", partOfSpeech: "noun", definition: "A seemingly contradictory statement that may be true.", example: "It is a paradox that standing is more tiring than walking.", category: "IELTS Essentials" },
  { id: 192, word: "Parallel", phonetic: "/ˈpær.ə.lel/", partOfSpeech: "adjective", definition: "Occurring at the same time and having similarities.", example: "There are parallel developments in both countries.", category: "IELTS Essentials" },
  { id: 193, word: "Perceive", phonetic: "/pəˈsiːv/", partOfSpeech: "verb", definition: "To become aware of through the senses.", example: "She perceived a change in his attitude.", category: "IELTS Essentials" },
  { id: 194, word: "Persist", phonetic: "/pəˈsɪst/", partOfSpeech: "verb", definition: "To continue firmly in an opinion or action.", example: "If symptoms persist, consult your doctor.", category: "IELTS Essentials" },
  { id: 195, word: "Perspective", phonetic: "/pəˈspek.tɪv/", partOfSpeech: "noun", definition: "A particular attitude toward or way of regarding something.", example: "The book offers a fresh perspective on history.", category: "IELTS Essentials" },
  { id: 196, word: "Phenomenon", phonetic: "/fɪˈnɒm.ɪ.nən/", partOfSpeech: "noun", definition: "A fact or situation observed to exist or happen.", example: "Global warming is a well-documented phenomenon.", category: "IELTS Essentials" },
  { id: 197, word: "Plausible", phonetic: "/ˈplɔː.zɪ.bəl/", partOfSpeech: "adjective", definition: "Seeming reasonable or probable.", example: "His explanation was plausible but unverified.", category: "IELTS Essentials" },
  { id: 198, word: "Precede", phonetic: "/prɪˈsiːd/", partOfSpeech: "verb", definition: "To come before in time or order.", example: "A brief introduction preceded the main lecture.", category: "IELTS Essentials" },
  { id: 199, word: "Precise", phonetic: "/prɪˈsaɪs/", partOfSpeech: "adjective", definition: "Marked by exactness and accuracy.", example: "Precise measurements are essential in scientific research.", category: "IELTS Essentials" },
  { id: 200, word: "Predominant", phonetic: "/prɪˈdɒm.ɪ.nənt/", partOfSpeech: "adjective", definition: "Present as the strongest or main element.", example: "Rice is the predominant crop in the region.", category: "IELTS Essentials" },
  { id: 201, word: "Preliminary", phonetic: "/prɪˈlɪm.ɪ.nər.i/", partOfSpeech: "adjective", definition: "Preceding the main matter; introductory.", example: "Preliminary results suggest the treatment is effective.", category: "IELTS Essentials" },
  { id: 202, word: "Presume", phonetic: "/prɪˈzjuːm/", partOfSpeech: "verb", definition: "To suppose that something is true without proof.", example: "I presume you have read the report already.", category: "IELTS Essentials" },
  { id: 203, word: "Prevalent", phonetic: "/ˈprev.əl.ənt/", partOfSpeech: "adjective", definition: "Widespread in a particular area or time.", example: "Malaria is prevalent in tropical regions.", category: "IELTS Essentials" },
  { id: 204, word: "Principle", phonetic: "/ˈprɪn.sɪ.pəl/", partOfSpeech: "noun", definition: "A fundamental truth serving as the basis for reasoning.", example: "The principle of equality underpins democratic society.", category: "IELTS Essentials" },
  { id: 205, word: "Proceed", phonetic: "/prəˈsiːd/", partOfSpeech: "verb", definition: "To begin or continue a course of action.", example: "Please proceed to the next section of the exam.", category: "IELTS Essentials" },
  { id: 206, word: "Prohibit", phonetic: "/prəˈhɪb.ɪt/", partOfSpeech: "verb", definition: "To formally forbid by law or authority.", example: "Smoking is prohibited in all public buildings.", category: "IELTS Essentials" },
  { id: 207, word: "Profound", phonetic: "/prəˈfaʊnd/", partOfSpeech: "adjective", definition: "Very great or intense; having deep insight.", example: "The discovery had a profound impact on medicine.", category: "IELTS Essentials" },
  { id: 208, word: "Promote", phonetic: "/prəˈməʊt/", partOfSpeech: "verb", definition: "To further the progress of; to advance.", example: "The campaign promotes awareness of mental health.", category: "IELTS Essentials" },
  { id: 209, word: "Proportion", phonetic: "/prəˈpɔː.ʃən/", partOfSpeech: "noun", definition: "A part or share of a whole.", example: "A large proportion of students passed the exam.", category: "IELTS Essentials" },
  { id: 210, word: "Prospect", phonetic: "/ˈprɒs.pekt/", partOfSpeech: "noun", definition: "The possibility of something happening in the future.", example: "The prospects for economic recovery are improving.", category: "IELTS Essentials" },
  { id: 211, word: "Pursue", phonetic: "/pəˈsjuː/", partOfSpeech: "verb", definition: "To follow or chase; to continue with an activity.", example: "She decided to pursue a career in medicine.", category: "IELTS Essentials" },
  { id: 212, word: "Rational", phonetic: "/ˈræʃ.ən.əl/", partOfSpeech: "adjective", definition: "Based on or in accordance with reason or logic.", example: "We need to make a rational decision based on evidence.", category: "IELTS Essentials" },
  { id: 213, word: "Refine", phonetic: "/rɪˈfaɪn/", partOfSpeech: "verb", definition: "To improve by making small changes.", example: "The artist refined her technique over many years.", category: "IELTS Essentials" },
  { id: 214, word: "Regime", phonetic: "/reɪˈʒiːm/", partOfSpeech: "noun", definition: "A government or system of organization.", example: "The new regime introduced sweeping reforms.", category: "IELTS Essentials" },
  { id: 215, word: "Reinforce", phonetic: "/ˌriː.ɪnˈfɔːrs/", partOfSpeech: "verb", definition: "To strengthen or support.", example: "The study reinforces the link between diet and health.", category: "IELTS Essentials" },
  { id: 216, word: "Reluctant", phonetic: "/rɪˈlʌk.tənt/", partOfSpeech: "adjective", definition: "Unwilling and hesitant; disinclined.", example: "He was reluctant to share his personal opinions.", category: "IELTS Essentials" },
  { id: 217, word: "Rely", phonetic: "/rɪˈlaɪ/", partOfSpeech: "verb", definition: "To depend on with full trust or confidence.", example: "Many students rely on scholarships to fund their education.", category: "IELTS Essentials" },
  { id: 218, word: "Render", phonetic: "/ˈren.dər/", partOfSpeech: "verb", definition: "To cause to be or become; to provide.", example: "The storm rendered the roads impassable.", category: "IELTS Essentials" },
  { id: 219, word: "Resilient", phonetic: "/rɪˈzɪl.i.ənt/", partOfSpeech: "adjective", definition: "Able to recover quickly from difficulties.", example: "The resilient community rebuilt after the natural disaster.", category: "IELTS Essentials" },
  { id: 220, word: "Restrain", phonetic: "/rɪˈstreɪn/", partOfSpeech: "verb", definition: "To prevent someone from doing something.", example: "She restrained herself from making a harsh comment.", category: "IELTS Essentials" },
  { id: 221, word: "Restrict", phonetic: "/rɪˈstrɪkt/", partOfSpeech: "verb", definition: "To put a limit on; keep under control.", example: "Access to the building is restricted to employees.", category: "IELTS Essentials" },
  { id: 222, word: "Retain", phonetic: "/rɪˈteɪn/", partOfSpeech: "verb", definition: "To continue to have; to keep possession of.", example: "The company retained its market-leading position.", category: "IELTS Essentials" },
  { id: 223, word: "Reveal", phonetic: "/rɪˈviːl/", partOfSpeech: "verb", definition: "To make previously unknown information known.", example: "The investigation revealed serious safety concerns.", category: "IELTS Essentials" },
  { id: 224, word: "Revenue", phonetic: "/ˈrev.ən.juː/", partOfSpeech: "noun", definition: "Income generated from business activities.", example: "Tourism is a major source of revenue for the island.", category: "IELTS Essentials" },
  { id: 225, word: "Rigid", phonetic: "/ˈrɪdʒ.ɪd/", partOfSpeech: "adjective", definition: "Unable to bend or be forced out of shape.", example: "The rigid rules left no room for flexibility.", category: "IELTS Essentials" },
  { id: 226, word: "Robust", phonetic: "/rəʊˈbʌst/", partOfSpeech: "adjective", definition: "Strong and healthy; vigorous.", example: "The economy showed robust growth in the third quarter.", category: "IELTS Essentials" },
  { id: 227, word: "Scope", phonetic: "/skəʊp/", partOfSpeech: "noun", definition: "The extent of the area or subject dealt with.", example: "The scope of the research was limited to urban areas.", category: "IELTS Essentials" },
  { id: 228, word: "Sector", phonetic: "/ˈsek.tər/", partOfSpeech: "noun", definition: "An area or portion of something.", example: "The healthcare sector employs millions of people.", category: "IELTS Essentials" },
  { id: 229, word: "Sequence", phonetic: "/ˈsiː.kwəns/", partOfSpeech: "noun", definition: "A particular order in which events follow each other.", example: "The steps must be completed in the correct sequence.", category: "IELTS Essentials" },
  { id: 230, word: "Significant", phonetic: "/sɪɡˈnɪf.ɪ.kənt/", partOfSpeech: "adjective", definition: "Sufficiently great or important to be worthy of attention.", example: "The research made a significant contribution to the field.", category: "IELTS Essentials" },
  { id: 231, word: "Simulate", phonetic: "/ˈsɪm.jə.leɪt/", partOfSpeech: "verb", definition: "To imitate the appearance or character of.", example: "The program simulates real-world driving conditions.", category: "IELTS Essentials" },
  { id: 232, word: "Sole", phonetic: "/səʊl/", partOfSpeech: "adjective", definition: "One and only; single.", example: "She was the sole survivor of the accident.", category: "IELTS Essentials" },
  { id: 233, word: "Somewhat", phonetic: "/ˈsʌm.wɒt/", partOfSpeech: "adverb", definition: "To a moderate extent or degree.", example: "The results were somewhat disappointing.", category: "IELTS Essentials" },
  { id: 234, word: "Specify", phonetic: "/ˈspes.ɪ.faɪ/", partOfSpeech: "verb", definition: "To identify clearly and definitely.", example: "Please specify your dietary requirements.", category: "IELTS Essentials" },
  { id: 235, word: "Sphere", phonetic: "/sfɪər/", partOfSpeech: "noun", definition: "An area of activity, interest, or expertise.", example: "Her sphere of influence extends across the continent.", category: "IELTS Essentials" },
  { id: 236, word: "Stable", phonetic: "/ˈsteɪ.bəl/", partOfSpeech: "adjective", definition: "Not likely to change or fail; firmly established.", example: "The patient's condition is now stable.", category: "IELTS Essentials" },
  { id: 237, word: "Statistic", phonetic: "/stəˈtɪs.tɪk/", partOfSpeech: "noun", definition: "A fact or piece of data from a study.", example: "The statistic reveals a troubling trend in education.", category: "IELTS Essentials" },
  { id: 238, word: "Stimulate", phonetic: "/ˈstɪm.jə.leɪt/", partOfSpeech: "verb", definition: "To encourage development or increased activity.", example: "The government hopes to stimulate economic growth.", category: "IELTS Essentials" },
  { id: 239, word: "Straightforward", phonetic: "/ˌstreɪtˈfɔː.wəd/", partOfSpeech: "adjective", definition: "Uncomplicated and easy to do or understand.", example: "The instructions are straightforward and clear.", category: "IELTS Essentials" },
  { id: 240, word: "Strategy", phonetic: "/ˈstræt.ə.dʒi/", partOfSpeech: "noun", definition: "A plan of action to achieve a long-term goal.", example: "The company developed a new marketing strategy.", category: "IELTS Essentials" },
  { id: 241, word: "Subsequent", phonetic: "/ˈsʌb.sɪ.kwənt/", partOfSpeech: "adjective", definition: "Coming after something in time; following.", example: "Subsequent research confirmed the initial findings.", category: "IELTS Essentials" },
  { id: 242, word: "Subsidy", phonetic: "/ˈsʌb.sɪ.di/", partOfSpeech: "noun", definition: "A sum of money granted by the government.", example: "Farmers receive subsidies to grow certain crops.", category: "IELTS Essentials" },
  { id: 243, word: "Substitute", phonetic: "/ˈsʌb.stɪ.tjuːt/", partOfSpeech: "verb", definition: "To use or add in place of.", example: "You can substitute olive oil for butter in the recipe.", category: "IELTS Essentials" },
  { id: 244, word: "Successor", phonetic: "/səkˈses.ər/", partOfSpeech: "noun", definition: "A person or thing that succeeds another.", example: "She was appointed as his successor.", category: "IELTS Essentials" },
  { id: 245, word: "Sufficient", phonetic: "/səˈfɪʃ.ənt/", partOfSpeech: "adjective", definition: "Enough; adequate for a purpose.", example: "There is sufficient evidence to proceed with the trial.", category: "IELTS Essentials" },
  { id: 246, word: "Supplement", phonetic: "/ˈsʌp.lɪ.ment/", partOfSpeech: "verb", definition: "To add something extra to enhance or complete.", example: "She supplements her diet with vitamins.", category: "IELTS Essentials" },
  { id: 247, word: "Suspend", phonetic: "/səˈspend/", partOfSpeech: "verb", definition: "To temporarily prevent from continuing.", example: "The airline suspended flights due to bad weather.", category: "IELTS Essentials" },
  { id: 248, word: "Sustain", phonetic: "/səˈsteɪn/", partOfSpeech: "verb", definition: "To strengthen or support physically or mentally.", example: "The region cannot sustain further population growth.", category: "IELTS Essentials" },
  { id: 249, word: "Symbol", phonetic: "/ˈsɪm.bəl/", partOfSpeech: "noun", definition: "A thing representing something else.", example: "The dove is a symbol of peace.", category: "IELTS Essentials" },
  { id: 250, word: "Tense", phonetic: "/tens/", partOfSpeech: "adjective", definition: "Feeling or causing anxiety and nervousness.", example: "The atmosphere in the courtroom was extremely tense.", category: "IELTS Essentials" },
  { id: 251, word: "Terminate", phonetic: "/ˈtɜː.mɪ.neɪt/", partOfSpeech: "verb", definition: "To bring to an end.", example: "The contract was terminated due to a breach of terms.", category: "IELTS Essentials" },
  { id: 252, word: "Theme", phonetic: "/θiːm/", partOfSpeech: "noun", definition: "The subject of a talk, piece of writing, or exhibition.", example: "The theme of the conference is sustainable development.", category: "IELTS Essentials" },
  { id: 253, word: "Thereby", phonetic: "/ˌðeəˈbaɪ/", partOfSpeech: "adverb", definition: "By that means; as a result of that.", example: "She became a citizen, thereby gaining the right to vote.", category: "IELTS Essentials" },
  { id: 254, word: "Thesis", phonetic: "/ˈθiː.sɪs/", partOfSpeech: "noun", definition: "A statement or theory put forward to be proved.", example: "Her thesis explores the impact of social media on youth.", category: "IELTS Essentials" },
  { id: 255, word: "Trace", phonetic: "/treɪs/", partOfSpeech: "verb", definition: "To find or discover by investigation.", example: "Historians traced the origins of the tradition.", category: "IELTS Essentials" },
  { id: 256, word: "Tradition", phonetic: "/trəˈdɪʃ.ən/", partOfSpeech: "noun", definition: "A long-established custom or belief.", example: "The tradition of afternoon tea dates back centuries.", category: "IELTS Essentials" },
  { id: 257, word: "Transfer", phonetic: "/trænsˈfɜːr/", partOfSpeech: "verb", definition: "To move from one place to another.", example: "She transferred to a different department.", category: "IELTS Essentials" },
  { id: 258, word: "Transform", phonetic: "/trænsˈfɔːrm/", partOfSpeech: "verb", definition: "To change in form, appearance, or character.", example: "Technology has transformed the way we communicate.", category: "IELTS Essentials" },
  { id: 259, word: "Transit", phonetic: "/ˈtræn.zɪt/", partOfSpeech: "noun", definition: "The carrying of people or goods from one place to another.", example: "Public transit reduces traffic congestion in cities.", category: "IELTS Essentials" },
  { id: 260, word: "Transmit", phonetic: "/trænzˈmɪt/", partOfSpeech: "verb", definition: "To cause something to pass from one place to another.", example: "The disease is transmitted through contaminated water.", category: "IELTS Essentials" },
  { id: 261, word: "Transport", phonetic: "/trænˈspɔːrt/", partOfSpeech: "verb", definition: "To carry people or goods from one place to another.", example: "Goods are transported by rail across the country.", category: "IELTS Essentials" },
  { id: 262, word: "Trend", phonetic: "/trend/", partOfSpeech: "noun", definition: "A general direction in which something is developing.", example: "There is a growing trend toward remote working.", category: "IELTS Essentials" },
  { id: 263, word: "Trigger", phonetic: "/ˈtrɪɡ.ər/", partOfSpeech: "verb", definition: "To cause an event or situation to happen.", example: "The announcement triggered widespread protests.", category: "IELTS Essentials" },
  { id: 264, word: "Ubiquitous", phonetic: "/juːˈbɪk.wɪ.təs/", partOfSpeech: "adjective", definition: "Present, appearing, or found everywhere.", example: "Smartphones have become ubiquitous in modern society.", category: "IELTS Essentials" },
  { id: 265, word: "Ultimate", phonetic: "/ˈʌl.tɪ.mət/", partOfSpeech: "adjective", definition: "Being the best or most extreme example of its kind.", example: "The ultimate goal is to eradicate the disease entirely.", category: "IELTS Essentials" },
  { id: 266, word: "Undergo", phonetic: "/ˌʌn.dəˈɡəʊ/", partOfSpeech: "verb", definition: "To experience something, typically unpleasant.", example: "The building underwent extensive renovation.", category: "IELTS Essentials" },
  { id: 267, word: "Underlie", phonetic: "/ˌʌn.dəˈlaɪ/", partOfSpeech: "verb", definition: "To be the cause or basis of.", example: "Several factors underlie the rise in unemployment.", category: "IELTS Essentials" },
  { id: 268, word: "Undertake", phonetic: "/ˌʌn.dəˈteɪk/", partOfSpeech: "verb", definition: "To commit oneself to begin and carry out.", example: "She undertook the task with great determination.", category: "IELTS Essentials" },
  { id: 269, word: "Uniform", phonetic: "/ˈjuː.nɪ.fɔːrm/", partOfSpeech: "adjective", definition: "Not changing in form or character; consistent.", example: "The quality of the product is uniform across batches.", category: "IELTS Essentials" },
  { id: 270, word: "Unique", phonetic: "/juːˈniːk/", partOfSpeech: "adjective", definition: "Being the only one of its kind; unlike anything else.", example: "Each student has a unique learning style.", category: "IELTS Essentials" },
  { id: 271, word: "Unify", phonetic: "/ˈjuː.nɪ.faɪ/", partOfSpeech: "verb", definition: "To make or become united or uniform.", example: "The leader sought to unify the divided community.", category: "IELTS Essentials" },
  { id: 272, word: "Utilize", phonetic: "/ˈjuː.tɪ.laɪz/", partOfSpeech: "verb", definition: "To make practical and effective use of.", example: "The company utilizes renewable energy sources.", category: "IELTS Essentials" },
  { id: 273, word: "Valid", phonetic: "/ˈvæl.ɪd/", partOfSpeech: "adjective", definition: "Having a sound basis in logic or fact.", example: "She raised a valid point during the discussion.", category: "IELTS Essentials" },
  { id: 274, word: "Vary", phonetic: "/ˈveə.ri/", partOfSpeech: "verb", definition: "To differ in size, amount, degree, or nature.", example: "Prices vary depending on the season.", category: "IELTS Essentials" },
  { id: 275, word: "Vehicle", phonetic: "/ˈviː.ɪ.kəl/", partOfSpeech: "noun", definition: "A means of transport or a medium for expression.", example: "Art can be a vehicle for social change.", category: "IELTS Essentials" },
  { id: 276, word: "Verify", phonetic: "/ˈver.ɪ.faɪ/", partOfSpeech: "verb", definition: "To make sure or demonstrate that something is true.", example: "Please verify your email address before proceeding.", category: "IELTS Essentials" },
  { id: 277, word: "Version", phonetic: "/ˈvɜː.ʃən/", partOfSpeech: "noun", definition: "A particular form of something differing from others.", example: "The latest version of the software includes new features.", category: "IELTS Essentials" },
  { id: 278, word: "Via", phonetic: "/ˈvaɪ.ə/", partOfSpeech: "preposition", definition: "Traveling through a place on the way to a destination.", example: "She traveled to Paris via London.", category: "IELTS Essentials" },
  { id: 279, word: "Violate", phonetic: "/ˈvaɪ.ə.leɪt/", partOfSpeech: "verb", definition: "To break or fail to comply with a rule or agreement.", example: "The company violated environmental regulations.", category: "IELTS Essentials" },
  { id: 280, word: "Virtual", phonetic: "/ˈvɜː.tʃu.əl/", partOfSpeech: "adjective", definition: "Almost or nearly as described, but not completely.", example: "Virtual meetings have replaced many face-to-face gatherings.", category: "IELTS Essentials" },
  { id: 281, word: "Visible", phonetic: "/ˈvɪz.ɪ.bəl/", partOfSpeech: "adjective", definition: "Able to be seen or noticed.", example: "The effects of climate change are now clearly visible.", category: "IELTS Essentials" },
  { id: 282, word: "Visual", phonetic: "/ˈvɪʒ.u.əl/", partOfSpeech: "adjective", definition: "Relating to seeing or sight.", example: "Visual aids can enhance a presentation significantly.", category: "IELTS Essentials" },
  { id: 283, word: "Volume", phonetic: "/ˈvɒl.juːm/", partOfSpeech: "noun", definition: "The amount of space occupied by something.", example: "The volume of traffic increased during rush hour.", category: "IELTS Essentials" },
  { id: 284, word: "Voluntary", phonetic: "/ˈvɒl.ən.tər.i/", partOfSpeech: "adjective", definition: "Done or given of one's own free will.", example: "Participation in the study was voluntary.", category: "IELTS Essentials" },
  { id: 285, word: "Welfare", phonetic: "/ˈwel.feər/", partOfSpeech: "noun", definition: "The health, happiness, and well-being of a person.", example: "The government is responsible for the welfare of its citizens.", category: "IELTS Essentials" },
  { id: 286, word: "Widespread", phonetic: "/ˈwaɪd.spred/", partOfSpeech: "adjective", definition: "Found or distributed over a large area.", example: "There is widespread concern about air pollution.", category: "IELTS Essentials" },
  { id: 287, word: "Yield", phonetic: "/jiːld/", partOfSpeech: "verb", definition: "To produce or provide a result.", example: "The experiment yielded surprising results.", category: "IELTS Essentials" },
  { id: 288, word: "Abstract", phonetic: "/ˈæb.strækt/", partOfSpeech: "noun", definition: "A summary of the contents of a book or article.", example: "The abstract should be no longer than 250 words.", category: "Academic Writing" },
  { id: 289, word: "Acknowledge", phonetic: "/əkˈnɒl.ɪdʒ/", partOfSpeech: "verb", definition: "To accept or admit the existence or truth of.", example: "The author acknowledged the limitations of the study.", category: "Academic Writing" },
  { id: 290, word: "Annotate", phonetic: "/ˈæn.ə.teɪt/", partOfSpeech: "verb", definition: "To add notes to a text or diagram for explanation.", example: "Students should annotate their readings with key ideas.", category: "Academic Writing" },
  { id: 291, word: "Analyze", phonetic: "/ˈæn.ə.laɪz/", partOfSpeech: "verb", definition: "To examine methodically and in detail.", example: "The researcher analyzed data from 500 participants.", category: "Academic Writing" },
  { id: 292, word: "Appendix", phonetic: "/əˈpen.dɪks/", partOfSpeech: "noun", definition: "A section of additional material at the end of a book.", example: "The survey questions are included in the appendix.", category: "Academic Writing" },
  { id: 293, word: "Articulate", phonetic: "/ɑːˈtɪk.jə.leɪt/", partOfSpeech: "verb", definition: "To express an idea or feeling fluently and coherently.", example: "She articulated her argument with great clarity.", category: "Academic Writing" },
  { id: 294, word: "Assert", phonetic: "/əˈsɜːrt/", partOfSpeech: "verb", definition: "To state a fact or belief confidently and forcefully.", example: "The author asserts that poverty is the root cause.", category: "Academic Writing" },
  { id: 295, word: "Assumption", phonetic: "/əˈsʌmp.ʃən/", partOfSpeech: "noun", definition: "A thing accepted as true without proof.", example: "The model is based on several key assumptions.", category: "Academic Writing" },
  { id: 296, word: "Bibliography", phonetic: "/ˌbɪb.liˈɒɡ.rə.fi/", partOfSpeech: "noun", definition: "A list of the books and articles used in research.", example: "A comprehensive bibliography was included at the end.", category: "Academic Writing" },
  { id: 297, word: "Causal", phonetic: "/ˈkɔː.zəl/", partOfSpeech: "adjective", definition: "Relating to or acting as a cause.", example: "The study found a causal relationship between smoking and cancer.", category: "Academic Writing" },
  { id: 298, word: "Chronological", phonetic: "/ˌkrɒn.əˈlɒdʒ.ɪ.kəl/", partOfSpeech: "adjective", definition: "Relating to the order of time.", example: "The events are presented in chronological order.", category: "Academic Writing" },
  { id: 299, word: "Clarify", phonetic: "/ˈklær.ɪ.faɪ/", partOfSpeech: "verb", definition: "To make a statement or situation less confused.", example: "Could you clarify your position on this issue?", category: "Academic Writing" },
  { id: 300, word: "Cohesion", phonetic: "/kəʊˈhiː.ʒən/", partOfSpeech: "noun", definition: "The action of forming a united whole.", example: "The essay lacks cohesion between paragraphs.", category: "Academic Writing" },
  { id: 301, word: "Collate", phonetic: "/kəˈleɪt/", partOfSpeech: "verb", definition: "To collect and combine texts or information.", example: "The team collated data from various sources.", category: "Academic Writing" },
  { id: 302, word: "Compile", phonetic: "/kəmˈpaɪl/", partOfSpeech: "verb", definition: "To produce by assembling information from other sources.", example: "She compiled a list of references for her thesis.", category: "Academic Writing" },
  { id: 303, word: "Concise", phonetic: "/kənˈsaɪs/", partOfSpeech: "adjective", definition: "Giving a lot of information clearly in few words.", example: "Academic writing should be concise and precise.", category: "Academic Writing" },
  { id: 304, word: "Consensus", phonetic: "/kənˈsen.səs/", partOfSpeech: "noun", definition: "A general agreement among a group.", example: "There is a growing consensus on the need for reform.", category: "Academic Writing" },
  { id: 305, word: "Context", phonetic: "/ˈkɒn.tekst/", partOfSpeech: "noun", definition: "The circumstances that form the setting for an event.", example: "The results must be understood within their historical context.", category: "Academic Writing" },
  { id: 306, word: "Contradict", phonetic: "/ˌkɒn.trəˈdɪkt/", partOfSpeech: "verb", definition: "To deny the truth of a statement by asserting the opposite.", example: "These findings contradict earlier research.", category: "Academic Writing" },
  { id: 307, word: "Corroborate", phonetic: "/kəˈrɒb.ə.reɪt/", partOfSpeech: "verb", definition: "To confirm or give support to a statement or theory.", example: "Additional experiments corroborated the initial findings.", category: "Academic Writing" },
  { id: 308, word: "Criterion", phonetic: "/kraɪˈtɪə.ri.ən/", partOfSpeech: "noun", definition: "A standard by which something may be judged.", example: "The main criterion for selection was academic achievement.", category: "Academic Writing" },
  { id: 309, word: "Critique", phonetic: "/krɪˈtiːk/", partOfSpeech: "noun", definition: "A detailed analysis and assessment of something.", example: "The professor provided a thorough critique of the essay.", category: "Academic Writing" },
  { id: 310, word: "Deduce", phonetic: "/dɪˈdjuːs/", partOfSpeech: "verb", definition: "To arrive at a conclusion by reasoning.", example: "We can deduce several important trends from the data.", category: "Academic Writing" },
  { id: 311, word: "Delineate", phonetic: "/dɪˈlɪn.i.eɪt/", partOfSpeech: "verb", definition: "To describe or portray something precisely.", example: "The report delineates the boundaries of the study.", category: "Academic Writing" },
  { id: 312, word: "Discourse", phonetic: "/ˈdɪs.kɔːrs/", partOfSpeech: "noun", definition: "Written or spoken communication on a subject.", example: "Academic discourse requires formal language.", category: "Academic Writing" },
  { id: 313, word: "Disseminate", phonetic: "/dɪˈsem.ɪ.neɪt/", partOfSpeech: "verb", definition: "To spread information widely.", example: "The findings were disseminated through academic journals.", category: "Academic Writing" },
  { id: 314, word: "Elucidate", phonetic: "/ɪˈluː.sɪ.deɪt/", partOfSpeech: "verb", definition: "To make something clear; explain.", example: "The diagram helps elucidate the complex process.", category: "Academic Writing" },
  { id: 315, word: "Empirical", phonetic: "/ɪmˈpɪr.ɪ.kəl/", partOfSpeech: "adjective", definition: "Based on observation rather than theory or logic.", example: "The claim requires empirical evidence to be accepted.", category: "Academic Writing" },
  { id: 316, word: "Enumerate", phonetic: "/ɪˈnjuː.mər.eɪt/", partOfSpeech: "verb", definition: "To mention things one by one.", example: "The report enumerates the key factors contributing to failure.", category: "Academic Writing" },
  { id: 317, word: "Excerpt", phonetic: "/ˈek.sɜːpt/", partOfSpeech: "noun", definition: "A short extract from a text.", example: "An excerpt from the novel was published in the magazine.", category: "Academic Writing" },
  { id: 318, word: "Exemplify", phonetic: "/ɪɡˈzem.plɪ.faɪ/", partOfSpeech: "verb", definition: "To serve as a typical example of something.", example: "This case exemplifies the challenges of remote education.", category: "Academic Writing" },
  { id: 319, word: "Expound", phonetic: "/ɪkˈspaʊnd/", partOfSpeech: "verb", definition: "To present and explain a theory or idea in detail.", example: "The professor expounded on the theory of relativity.", category: "Academic Writing" },
  { id: 320, word: "Extrapolate", phonetic: "/ɪkˈstræp.ə.leɪt/", partOfSpeech: "verb", definition: "To extend known data into an unknown area.", example: "It is difficult to extrapolate future trends from limited data.", category: "Academic Writing" },
  { id: 321, word: "Feasible", phonetic: "/ˈfiː.zɪ.bəl/", partOfSpeech: "adjective", definition: "Possible to do easily or conveniently.", example: "The plan is not feasible given the current budget.", category: "Academic Writing" },
  { id: 322, word: "Foregoing", phonetic: "/ˈfɔː.ɡəʊ.ɪŋ/", partOfSpeech: "adjective", definition: "Previously stated or written.", example: "The foregoing analysis suggests several key trends.", category: "Academic Writing" },
  { id: 323, word: "Formulate", phonetic: "/ˈfɔː.mjə.leɪt/", partOfSpeech: "verb", definition: "To create or devise methodically.", example: "The team formulated a research question.", category: "Academic Writing" },
  { id: 324, word: "Framework", phonetic: "/ˈfreɪm.wɜːk/", partOfSpeech: "noun", definition: "A basic structure underlying a system or concept.", example: "The theoretical framework guides the entire study.", category: "Academic Writing" },
  { id: 325, word: "Hypothesis", phonetic: "/haɪˈpɒθ.ə.sɪs/", partOfSpeech: "noun", definition: "A supposition made as a basis for reasoning.", example: "The hypothesis was tested using a controlled experiment.", category: "Academic Writing" },
  { id: 326, word: "Implication", phonetic: "/ˌɪm.plɪˈkeɪ.ʃən/", partOfSpeech: "noun", definition: "A conclusion that can be drawn from something.", example: "The implications of the study are far-reaching.", category: "Academic Writing" },
  { id: 327, word: "Infer", phonetic: "/ɪnˈfɜːr/", partOfSpeech: "verb", definition: "To deduce or conclude from evidence.", example: "From the data, we can infer a causal relationship.", category: "Academic Writing" },
  { id: 328, word: "Juxtapose", phonetic: "/ˌdʒʌk.stəˈpəʊz/", partOfSpeech: "verb", definition: "To place close together for contrasting effect.", example: "The author juxtaposes urban and rural lifestyles.", category: "Academic Writing" },
  { id: 329, word: "Methodology", phonetic: "/ˌmeθ.əˈdɒl.ə.dʒi/", partOfSpeech: "noun", definition: "A system of methods used in a field of study.", example: "The methodology section describes how data was collected.", category: "Academic Writing" },
  { id: 330, word: "Mitigate", phonetic: "/ˈmɪt.ɪ.ɡeɪt/", partOfSpeech: "verb", definition: "To make something less severe or serious.", example: "Steps were taken to mitigate the environmental damage.", category: "Academic Writing" },
  { id: 331, word: "Objective", phonetic: "/əbˈdʒek.tɪv/", partOfSpeech: "adjective", definition: "Not influenced by personal feelings or opinions.", example: "The review provides an objective assessment of the evidence.", category: "Academic Writing" },
  { id: 332, word: "Paradigm", phonetic: "/ˈpær.ə.daɪm/", partOfSpeech: "noun", definition: "A typical example or pattern of something.", example: "The research introduced a new paradigm in cognitive science.", category: "Academic Writing" },
  { id: 333, word: "Paraphrase", phonetic: "/ˈpær.ə.freɪz/", partOfSpeech: "verb", definition: "To express the meaning using different words.", example: "Students should paraphrase sources rather than copying them.", category: "Academic Writing" },
  { id: 334, word: "Peer-reviewed", phonetic: "/pɪər rɪˈvjuːd/", partOfSpeech: "adjective", definition: "Evaluated by experts in the same field.", example: "Only peer-reviewed articles were included in the analysis.", category: "Academic Writing" },
  { id: 335, word: "Pertinent", phonetic: "/ˈpɜː.tɪ.nənt/", partOfSpeech: "adjective", definition: "Relevant or applicable to a particular matter.", example: "The lawyer raised several pertinent questions.", category: "Academic Writing" },
  { id: 336, word: "Plagiarism", phonetic: "/ˈpleɪ.dʒər.ɪ.zəm/", partOfSpeech: "noun", definition: "The practice of taking someone else's work as your own.", example: "Plagiarism is a serious offense in academic institutions.", category: "Academic Writing" },
  { id: 337, word: "Plausible", phonetic: "/ˈplɔː.zɪ.bəl/", partOfSpeech: "adjective", definition: "Seeming reasonable or probable.", example: "The theory is plausible but lacks empirical support.", category: "Academic Writing" },
  { id: 338, word: "Postulate", phonetic: "/ˈpɒs.tʃə.leɪt/", partOfSpeech: "verb", definition: "To suggest or assume the truth of something.", example: "Darwin postulated the theory of natural selection.", category: "Academic Writing" },
  { id: 339, word: "Premise", phonetic: "/ˈprem.ɪs/", partOfSpeech: "noun", definition: "A statement from which a conclusion can be drawn.", example: "The argument is based on a false premise.", category: "Academic Writing" },
  { id: 340, word: "Qualitative", phonetic: "/ˈkwɒl.ɪ.tə.tɪv/", partOfSpeech: "adjective", definition: "Relating to the quality or character of something.", example: "Qualitative research explores meanings and experiences.", category: "Academic Writing" },
  { id: 341, word: "Quantitative", phonetic: "/ˈkwɒn.tɪ.tə.tɪv/", partOfSpeech: "adjective", definition: "Relating to, measuring, or measured by quantity.", example: "Quantitative analysis revealed a strong correlation.", category: "Academic Writing" },
  { id: 342, word: "Rationale", phonetic: "/ˌræʃ.ənˈæl/", partOfSpeech: "noun", definition: "A set of reasons or a logical basis for a course of action.", example: "The rationale behind the policy change was economic efficiency.", category: "Academic Writing" },
  { id: 343, word: "Rebut", phonetic: "/rɪˈbʌt/", partOfSpeech: "verb", definition: "To claim or prove that evidence is false.", example: "The defense rebutted the prosecution's main argument.", category: "Academic Writing" },
  { id: 344, word: "Recapitulate", phonetic: "/ˌriː.kəˈpɪtʃ.ə.leɪt/", partOfSpeech: "verb", definition: "To summarize and state again the main points.", example: "Let me recapitulate the key findings of the study.", category: "Academic Writing" },
  { id: 345, word: "Refute", phonetic: "/rɪˈfjuːt/", partOfSpeech: "verb", definition: "To prove a statement or theory to be wrong.", example: "The experiment refuted the widely accepted theory.", category: "Academic Writing" },
  { id: 346, word: "Rigorous", phonetic: "/ˈrɪɡ.ər.əs/", partOfSpeech: "adjective", definition: "Extremely thorough and careful.", example: "The study followed a rigorous experimental design.", category: "Academic Writing" },
  { id: 347, word: "Scrutinize", phonetic: "/ˈskruː.tɪ.naɪz/", partOfSpeech: "verb", definition: "To examine or inspect closely and thoroughly.", example: "Reviewers scrutinized every aspect of the manuscript.", category: "Academic Writing" },
  { id: 348, word: "Subjective", phonetic: "/səbˈdʒek.tɪv/", partOfSpeech: "adjective", definition: "Based on personal feelings or opinions.", example: "Grading essays can be a subjective process.", category: "Academic Writing" },
  { id: 349, word: "Substantiate", phonetic: "/səbˈstæn.ʃi.eɪt/", partOfSpeech: "verb", definition: "To provide evidence to support or prove.", example: "The claims were not substantiated by the evidence.", category: "Academic Writing" },
  { id: 350, word: "Succinct", phonetic: "/səkˈsɪŋkt/", partOfSpeech: "adjective", definition: "Briefly and clearly expressed.", example: "Write a succinct summary of the main argument.", category: "Academic Writing" },
  { id: 351, word: "Supplement", phonetic: "/ˈsʌp.lɪ.ment/", partOfSpeech: "verb", definition: "To add extra material to enhance something.", example: "The textbook is supplemented with online resources.", category: "Academic Writing" },
  { id: 352, word: "Synthesize", phonetic: "/ˈsɪn.θə.saɪz/", partOfSpeech: "verb", definition: "To combine elements into a coherent whole.", example: "The essay synthesizes research from multiple disciplines.", category: "Academic Writing" },
  { id: 353, word: "Tentative", phonetic: "/ˈten.tə.tɪv/", partOfSpeech: "adjective", definition: "Not certain or fixed; provisional.", example: "The findings are tentative and require further investigation.", category: "Academic Writing" },
  { id: 354, word: "Terminology", phonetic: "/ˌtɜː.mɪˈnɒl.ə.dʒi/", partOfSpeech: "noun", definition: "The body of terms used in a subject.", example: "Medical terminology can be difficult for beginners.", category: "Academic Writing" },
  { id: 355, word: "Theorem", phonetic: "/ˈθɪə.rəm/", partOfSpeech: "noun", definition: "A general proposition not self-evident but provable.", example: "Pythagoras' theorem is fundamental in geometry.", category: "Academic Writing" },
  { id: 356, word: "Thesis", phonetic: "/ˈθiː.sɪs/", partOfSpeech: "noun", definition: "A long essay involving personal research.", example: "She submitted her doctoral thesis on climate economics.", category: "Academic Writing" },
  { id: 357, word: "Underpin", phonetic: "/ˌʌn.dəˈpɪn/", partOfSpeech: "verb", definition: "To support or justify from beneath.", example: "Strong evidence underpins the conclusions of the study.", category: "Academic Writing" },
  { id: 358, word: "Validate", phonetic: "/ˈvæl.ɪ.deɪt/", partOfSpeech: "verb", definition: "To check or prove the accuracy of something.", example: "The results need to be validated through replication.", category: "Academic Writing" },
  { id: 359, word: "Variable", phonetic: "/ˈveə.ri.ə.bəl/", partOfSpeech: "noun", definition: "An element that can change in an experiment.", example: "Temperature was the independent variable in the study.", category: "Academic Writing" },
  { id: 360, word: "Verbose", phonetic: "/vɜːˈbəʊs/", partOfSpeech: "adjective", definition: "Using more words than needed; wordy.", example: "Academic writing should avoid being overly verbose.", category: "Academic Writing" },
  { id: 361, word: "A blessing in disguise", phonetic: "/ə ˈbles.ɪŋ ɪn dɪsˈɡaɪz/", partOfSpeech: "idiom", definition: "A good thing that seemed bad at first.", example: "Losing that job was a blessing in disguise.", category: "Common Idioms" },
  { id: 362, word: "A dime a dozen", phonetic: "/ə daɪm ə ˈdʌz.ən/", partOfSpeech: "idiom", definition: "Very common and of no particular value.", example: "Smartphones are a dime a dozen these days.", category: "Common Idioms" },
  { id: 363, word: "A penny for your thoughts", phonetic: "/ə ˈpen.i fɔːr jɔːr θɔːts/", partOfSpeech: "idiom", definition: "A way of asking what someone is thinking.", example: "You look deep in thought—a penny for your thoughts?", category: "Common Idioms" },
  { id: 364, word: "Actions speak louder than words", phonetic: "/ˈæk.ʃənz spiːk laʊd.ər ðæn wɜːdz/", partOfSpeech: "idiom", definition: "What you do matters more than what you say.", example: "He promised to change, but actions speak louder than words.", category: "Common Idioms" },
  { id: 365, word: "Add insult to injury", phonetic: "/æd ɪnˈsʌlt tuː ˈɪn.dʒər.i/", partOfSpeech: "idiom", definition: "To make a bad situation even worse.", example: "To add insult to injury, it started raining during the picnic.", category: "Common Idioms" },
  { id: 366, word: "At the drop of a hat", phonetic: "/æt ðə drɒp əv ə hæt/", partOfSpeech: "idiom", definition: "Without any hesitation; instantly.", example: "She would travel at the drop of a hat.", category: "Common Idioms" },
  { id: 367, word: "Back to square one", phonetic: "/bæk tuː skweər wʌn/", partOfSpeech: "idiom", definition: "Back to the beginning after a failed attempt.", example: "The project failed, so we are back to square one.", category: "Common Idioms" },
  { id: 368, word: "Bark up the wrong tree", phonetic: "/bɑːk ʌp ðə rɒŋ triː/", partOfSpeech: "idiom", definition: "To make a wrong assumption about something.", example: "If you think I did it, you are barking up the wrong tree.", category: "Common Idioms" },
  { id: 369, word: "Beat around the bush", phonetic: "/biːt əˈraʊnd ðə bʊʃ/", partOfSpeech: "idiom", definition: "To avoid talking about what is important.", example: "Stop beating around the bush and tell me the truth.", category: "Common Idioms" },
  { id: 370, word: "Bite off more than you can chew", phonetic: "/baɪt ɒf mɔːr ðæn juː kæn tʃuː/", partOfSpeech: "idiom", definition: "To take on more than one can handle.", example: "She bit off more than she could chew with five courses.", category: "Common Idioms" },
  { id: 371, word: "Bite the bullet", phonetic: "/baɪt ðə ˈbʊl.ɪt/", partOfSpeech: "idiom", definition: "To endure a painful experience bravely.", example: "I decided to bite the bullet and have the surgery.", category: "Common Idioms" },
  { id: 372, word: "Break the ice", phonetic: "/breɪk ðə aɪs/", partOfSpeech: "idiom", definition: "To initiate social interaction in an awkward situation.", example: "She told a joke to break the ice at the meeting.", category: "Common Idioms" },
  { id: 373, word: "Burn bridges", phonetic: "/bɜːn ˈbrɪdʒ.ɪz/", partOfSpeech: "idiom", definition: "To destroy relationships or connections permanently.", example: "Be careful not to burn bridges when you leave a job.", category: "Common Idioms" },
  { id: 374, word: "Burn the midnight oil", phonetic: "/bɜːn ðə ˈmɪd.naɪt ɔɪl/", partOfSpeech: "idiom", definition: "To work late into the night.", example: "Students often burn the midnight oil before exams.", category: "Common Idioms" },
  { id: 375, word: "By the skin of your teeth", phonetic: "/baɪ ðə skɪn əv jɔːr tiːθ/", partOfSpeech: "idiom", definition: "By a very narrow margin; just barely.", example: "He passed the exam by the skin of his teeth.", category: "Common Idioms" },
  { id: 376, word: "Call it a day", phonetic: "/kɔːl ɪt ə deɪ/", partOfSpeech: "idiom", definition: "To stop working on something for the day.", example: "We have been at this for hours—let us call it a day.", category: "Common Idioms" },
  { id: 377, word: "Cost an arm and a leg", phonetic: "/kɒst ən ɑːm ænd ə leɡ/", partOfSpeech: "idiom", definition: "To be very expensive.", example: "The repairs cost an arm and a leg.", category: "Common Idioms" },
  { id: 378, word: "Cross that bridge when you come to it", phonetic: "/krɒs ðæt brɪdʒ wen juː kʌm tuː ɪt/", partOfSpeech: "idiom", definition: "Deal with a problem only when it arises.", example: "We will cross that bridge when we come to it.", category: "Common Idioms" },
  { id: 379, word: "Cry over spilt milk", phonetic: "/kraɪ ˈəʊ.vər spɪlt mɪlk/", partOfSpeech: "idiom", definition: "To be upset about something that has already happened.", example: "There is no use crying over spilt milk.", category: "Common Idioms" },
  { id: 380, word: "Curiosity killed the cat", phonetic: "/ˌkjʊə.riˈɒs.ɪ.ti kɪld ðə kæt/", partOfSpeech: "idiom", definition: "Being too inquisitive can lead to trouble.", example: "I know you want to know, but curiosity killed the cat.", category: "Common Idioms" },
  { id: 381, word: "Cut corners", phonetic: "/kʌt ˈkɔː.nərz/", partOfSpeech: "idiom", definition: "To do something in the cheapest or easiest way.", example: "The builder cut corners, and the house had many problems.", category: "Common Idioms" },
  { id: 382, word: "Cut to the chase", phonetic: "/kʌt tuː ðə tʃeɪs/", partOfSpeech: "idiom", definition: "To get to the point without wasting time.", example: "Let me cut to the chase—we need more funding.", category: "Common Idioms" },
  { id: 383, word: "Every cloud has a silver lining", phonetic: "/ˈev.ri klaʊd hæz ə ˈsɪl.vər ˈlaɪ.nɪŋ/", partOfSpeech: "idiom", definition: "Every bad situation has some good aspect.", example: "I lost my job but found a better one—every cloud has a silver lining.", category: "Common Idioms" },
  { id: 384, word: "Get out of hand", phonetic: "/ɡet aʊt əv hænd/", partOfSpeech: "idiom", definition: "To get out of control.", example: "The party got out of hand very quickly.", category: "Common Idioms" },
